<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion - Wora Bora</title>
    <link rel="stylesheet" href="../css/Style.css">
    <link rel="icon" type="image/png" href="../img/Logo.png" />
</head>

<body>
    <nav class="navbarr">
        <a href="../index.html" class="navbar-logo">
            <img src="../img/Logo.png" alt="Wora Bora" style="height:40px; width:auto; vertical-align:middle" />
        </a>
        <div class="navbar-links">
            <a href="marketplace.html">Buscar DJs</a>
            <a href="login.html" id="nav-login">Iniciar sesion</a>
            <a href="register.html" id="nav-register" class="btn btn-primary">Registrarse</a>
            <a href="dashboard.html" id="nav-dashboard" style="display:none">Mi panel</a>
            <button id="nav-logout" style="display:none" class="btn btn-secondary">Salir</button>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-box">

            <h1>Iniciar sesion</h1>
            <p class="subtitle">Bienvenido otra vez</p>

            <div id="alerta" class="alerta error"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com" />
            </div>

            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" id="password" placeholder="......" />
            </div>

            <button id="btn-login" class="btn btn-primary"
                style="width:100%; margin-top:0.5rem">
                Iniciar sesion
            </button>

            <p class="form-footer">
                Sin cuenta? <a href="register.html">Registrate aqui</a>
            </p>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
    <script type="module" src="../js/navbar.js"></script>
</body>

</html>
