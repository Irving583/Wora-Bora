<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Wora Bora</title>
    <link rel="stylesheet" href="../css/Style.css">
</head>

<body>

    <!--NAVBARR-->

    <nav class="navbarr">
        <a href="../index.html" class="navbar-logo">WORA BORA</a>
        <div class="navbar-links">
            <a href="marketplace.html">Buscar DJs</a>
            <a href="login.html">Iniciar Sesion</a>
            <a href="register.html" class="btn btn-primary">Registrarse </a>
        </div>
    </nav>

    <!-- Formulario -->

    <div class="form-page">
        <div class="form-box">

            <h1>Inicar sesión</h1>
            <p class="subtitle"> Bienvenido otra vez</p>

            <!-- Errores -->
            <div id="alerta" class="alerta error"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com" />
            </div>

            <div class="form-group">
                <label for="password"> Contraseña</label>
                <input type="password" id="password" placeholder="......" />
            </div>

            <button id="btn-login" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Iniciar
                sesión</button>


            <p class="form-footer">
                ¿Aún sin cuenta? <a href="register.html">Registrate aquí</a>
            </p>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
    <script type="module" src="../js/navbar.js"></script>
</body>

</body>

</html>
