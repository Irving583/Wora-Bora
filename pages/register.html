<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Wora Bora</title>
    <link rel="stylesheet" href="../css/Style.css">
</head>

<body>
    <!--NAVBARRA-->
    <nav class="navbarr">
        <a href="../index.html" class="navbar-logo">Wora Bora</a>
        <div class="navbar-links">
            <a href="marketplace.html">Buscar DJs</a>
            <a href="login.html">Iniciar Sesion</a>
            <a href="register.html" class="btn btn-primary">Registrarse </a>

        </div>
    </nav>


    <!--Formulario-->

    <div class="form-page">
        <div class="form-box">

            <h1>Crear Cuenta</h1>
            <p class="subtitle">únete a Wora Bora Agency</p>

            <div id="alerta" class="alerta error"></div>

            <div class="form-group">
                <label for="nombre"> Nombre completo </label>
                <input type="text" id="nombre" placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com" />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
            </div>

    <!-- Rol de la persona que se registra-->


            <label class="label-rol">Quiero regiustrarme como</label>
            <div class="rol-selector">

                <div class="rol-option activo" data-rol="contratante">
                    <span class="rol-emoji">📝</span>
                    <div class="rol-label">Contratante</div>
                    <div class="rol-desc">Busco DJs para mis eventos</div>
                </div>


                <div class="rol-option" data-rol="DJ">
                    <span class="rol-emoji">🎧</span>
                    <div class="rol-label">DJ</div>
                    <div class="rol-desc">Ofrezco mis servicios</div>
                </div>



            </div>


            <!--Campo Oculto para poder guardar-->

            <input type="hidden" id="rol" value="contratante">

            <button id="btn-register" class="btn btn-primary" style="width: 100%; margin-top:0.5rem ;"> Crear Cuenta</button>

            <p class="form-footer">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>   
            </p>   
            
            
            </div>
    </div>
    <script type="module" src="../js/register.js"></script>
    <script type="module" src="../js/navbar.js"></script>
</body>

</html>
