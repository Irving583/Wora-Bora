<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Wora Bora</title>
    <link rel="stylesheet" href="../css/Style.css">
</head>

<body>
    <!--NAVBARRA-->
    <nav class="navbarr">
        <a href="../index.html" class="navbar-logo">WORA BORA</a>
        <div class="navbar-links">
            <a href="marketplace.html">Buscar DJs</a>
            <a href="login.html" id="nav-login">Iniciar sesión</a>
            <a href="register.html" id="nav-register" class="btn btn-primary">Registrarse</a>
            <a href="dashboard.html" id="nav-dashboard" style="display:none">Mi panel</a>
            <button id="nav-logout" style="display:none" class="btn btn-secondary">Salir</button>
        </div>
    </nav>

    <!--Formulario-->
    <div class="form-page">
        <div class="form-box">

            <h1>Crear Cuenta</h1>
            <p class="subtitle">Únete a Wora Bora Agency</p>

            <div id="alerta" class="alerta error"></div>

            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre" />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com" />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
            </div>

            <!-- Rol siempre contratante — oculto -->
            <input type="hidden" id="rol" value="contratante" />

            <button id="btn-register" class="btn btn-primary"
                style="width:100%; margin-top:0.5rem">
                Crear Cuenta
            </button>

            <p class="form-footer">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>

        </div>
    </div>

    <script type="module" src="../js/register.js"></script>
    <script type="module" src="../js/navbar.js"></script>
</body>

</html>
